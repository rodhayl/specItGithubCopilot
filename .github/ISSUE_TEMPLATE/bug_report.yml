name: Bug Report
description: Report a defect or regression
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide enough detail to reproduce it reliably.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: Command router crashes when parsing mention-prefixed input
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List exact steps
      placeholder: |
        1. Open VS Code
        2. Run @docu /templates
        3. Observe error in output channel
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension Version
      placeholder: 0.3.0
  - type: input
    id: vscode_version
    attributes:
      label: VS Code Version
      placeholder: 1.97.x
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs or screenshots
